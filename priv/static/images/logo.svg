<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" aria-hidden="true">
  <defs>
    <!-- Deep void gradient -->
    <radialGradient id="void" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Consciousness emanation -->
    <radialGradient id="awareness" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#FFB000" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#33ff00" stop-opacity="0.03"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <!-- The Third Eye -->
    <radialGradient id="eye-iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#33ff00" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFB000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFB000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow-wide">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- Thought-stream animation would go here in CSS -->
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="12" fill="#0d0906"/>

  <!-- === LAYER 0: The void it thinks into === -->
  <circle cx="64" cy="62" r="60" fill="url(#void)"/>
  <circle cx="64" cy="62" r="50" fill="url(#awareness)"/>

  <!-- === LAYER 1: Orbital thought rings === -->
  <!-- Like an atom or a planet — thoughts in orbit around the core -->
  <g stroke="#FFB000" fill="none" opacity="0.12" stroke-width="0.5">
    <ellipse cx="64" cy="60" rx="55" ry="20" transform="rotate(-20 64 60)"/>
    <ellipse cx="64" cy="60" rx="50" ry="18" transform="rotate(25 64 60)"/>
    <ellipse cx="64" cy="60" rx="58" ry="15" transform="rotate(70 64 60)"/>
  </g>

  <!-- === LAYER 2: Constellation network — the connectome === -->
  <!-- Major pathways -->
  <g stroke="#FFB000" stroke-width="0.3" opacity="0.18" fill="none" stroke-linecap="round">
    <!-- Outer web — ideas reaching into space -->
    <path d="M18 30 Q30 45 42 48"/>
    <path d="M110 30 Q98 45 86 48"/>
    <path d="M10 65 Q25 60 40 56"/>
    <path d="M118 65 Q103 60 88 56"/>
    <path d="M25 90 Q38 78 48 68"/>
    <path d="M103 90 Q90 78 80 68"/>
    <path d="M50 12 Q52 28 56 42"/>
    <path d="M78 12 Q76 28 72 42"/>
    <path d="M64 108 Q62 90 60 72"/>
    <!-- Cross connections -->
    <path d="M42 48 Q53 52 64 50 Q75 48 86 48"/>
    <path d="M40 56 Q52 62 64 60 Q76 58 88 56"/>
    <path d="M48 68 Q56 64 64 66 Q72 68 80 68"/>
    <path d="M56 42 Q60 46 64 44 Q68 42 72 42"/>
  </g>

  <!-- Secondary filaments — dendrites reaching outward -->
  <g stroke="#33ff00" stroke-width="0.25" opacity="0.1" fill="none" stroke-linecap="round">
    <path d="M18 30 Q8 22 4 14"/>
    <path d="M110 30 Q120 22 124 14"/>
    <path d="M10 65 Q4 68 2 74"/>
    <path d="M118 65 Q124 68 126 74"/>
    <path d="M25 90 Q18 98 14 108"/>
    <path d="M103 90 Q110 98 114 108"/>
    <path d="M50 12 Q48 6 44 2"/>
    <path d="M78 12 Q80 6 84 2"/>
    <path d="M64 108 Q64 116 66 124"/>
  </g>

  <!-- === LAYER 3: The ghost of a brain — you see it if you look === -->
  <!-- Barely-there hemisphere suggestion, not a literal brain drawing -->
  <g stroke="#FFB000" stroke-width="0.8" fill="none" opacity="0.22" stroke-linecap="round">
    <!-- Left lobe gesture -->
    <path d="M48 34 Q36 36 32 44 Q28 54 32 62 Q34 68 40 72 Q46 76 52 74"/>
    <!-- Right lobe gesture -->
    <path d="M80 34 Q92 36 96 44 Q100 54 96 62 Q94 68 88 72 Q82 76 76 74"/>
    <!-- Fold hints — just a few strokes -->
    <path d="M36 42 Q44 46 52 44" opacity="0.5"/>
    <path d="M92 42 Q84 46 76 44" opacity="0.5"/>
    <path d="M34 56 Q44 58 54 54" opacity="0.4"/>
    <path d="M94 56 Q84 58 74 54" opacity="0.4"/>
  </g>

  <!-- Stem / spine — grounding it -->
  <g stroke="#FFB000" stroke-width="0.6" opacity="0.15" fill="none">
    <path d="M64 74 Q62 82 60 90 Q58 98 60 106" stroke-linecap="round"/>
    <path d="M64 74 Q66 82 68 90 Q70 98 68 106" stroke-linecap="round"/>
  </g>

  <!-- === LAYER 4: Neural fire — the alive part === -->
  <!-- Major nodes with glow -->
  <g filter="url(#glow-strong)">
    <g fill="#33ff00">
      <!-- Cortex ring -->
      <circle cx="42" cy="48" r="2.2" opacity="0.9"/>
      <circle cx="86" cy="48" r="2.2" opacity="0.9"/>
      <circle cx="40" cy="56" r="1.6" opacity="0.7"/>
      <circle cx="88" cy="56" r="1.6" opacity="0.7"/>
      <circle cx="48" cy="68" r="1.8" opacity="0.8"/>
      <circle cx="80" cy="68" r="1.8" opacity="0.8"/>
      <!-- Deep structures -->
      <circle cx="56" cy="42" r="1.8" opacity="0.85"/>
      <circle cx="72" cy="42" r="1.8" opacity="0.85"/>
      <circle cx="54" cy="54" r="1.4" opacity="0.7"/>
      <circle cx="74" cy="54" r="1.4" opacity="0.7"/>
      <circle cx="60" cy="72" r="1.5" opacity="0.7"/>
    </g>
  </g>

  <!-- Distant stars — thoughts that escaped -->
  <g filter="url(#glow-strong)">
    <g fill="#FFB000">
      <circle cx="18" cy="30" r="1.4" opacity="0.6"/>
      <circle cx="110" cy="30" r="1.4" opacity="0.6"/>
      <circle cx="10" cy="65" r="1.2" opacity="0.5"/>
      <circle cx="118" cy="65" r="1.2" opacity="0.5"/>
      <circle cx="25" cy="90" r="1.0" opacity="0.45"/>
      <circle cx="103" cy="90" r="1.0" opacity="0.45"/>
      <circle cx="50" cy="12" r="1.3" opacity="0.55"/>
      <circle cx="78" cy="12" r="1.3" opacity="0.55"/>
      <circle cx="64" cy="108" r="1.1" opacity="0.5"/>
    </g>
  </g>

  <!-- Outermost sparks — at the edge of perception -->
  <g fill="#33ff00" opacity="0.25">
    <circle cx="4" cy="14" r="0.7"/>
    <circle cx="124" cy="14" r="0.7"/>
    <circle cx="2" cy="74" r="0.6"/>
    <circle cx="126" cy="74" r="0.6"/>
    <circle cx="14" cy="108" r="0.6"/>
    <circle cx="114" cy="108" r="0.6"/>
    <circle cx="44" cy="2" r="0.6"/>
    <circle cx="84" cy="2" r="0.6"/>
    <circle cx="66" cy="124" r="0.5"/>
  </g>

  <!-- === LAYER 5: The eye — the thing that's aware === -->
  <!-- A single watching presence at center, the seat of consciousness -->
  <g filter="url(#glow-strong)">
    <ellipse cx="64" cy="50" rx="6" ry="4" stroke="#FFB000" stroke-width="1" fill="none" opacity="0.7"/>
    <ellipse cx="64" cy="50" rx="3.5" ry="3.5" fill="url(#eye-iris)" opacity="0.8"/>
    <circle cx="64" cy="50" r="1.5" fill="#0d0906"/>
    <!-- Pupil highlight -->
    <circle cx="65" cy="49" r="0.5" fill="#33ff00" opacity="0.6"/>
  </g>

  <!-- Eye glow wash -->
  <ellipse cx="64" cy="50" rx="12" ry="8" fill="#FFB000" opacity="0.04" filter="url(#glow-wide)"/>

  <!-- === LAYER 6: Data streams — information flowing in === -->
  <!-- Thin vertical streams like rain or matrix code, feeding the mind -->
  <g stroke="#33ff00" stroke-width="0.3" opacity="0.08" stroke-linecap="round" stroke-dasharray="1.5 4">
    <line x1="30" y1="0" x2="34" y2="40"/>
    <line x1="45" y1="0" x2="48" y2="35"/>
    <line x1="64" y1="0" x2="64" y2="30"/>
    <line x1="83" y1="0" x2="80" y2="35"/>
    <line x1="98" y1="0" x2="94" y2="40"/>
    <!-- Upward streams — output, expression -->
    <line x1="40" y1="128" x2="44" y2="80"/>
    <line x1="64" y1="128" x2="64" y2="85"/>
    <line x1="88" y1="128" x2="84" y2="80"/>
  </g>
</svg>
