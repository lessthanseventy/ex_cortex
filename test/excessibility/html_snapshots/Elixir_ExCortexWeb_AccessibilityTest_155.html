      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <h1 class="text-2xl font-bold tracking-tight t-bright">
            Neurons
          </h1>
          <p class="t-dim text-sm">
            1 neurons across 1 clusters
          </p>
        </div>
        <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
          <div class="tui-panel lg:col-span-1">
            <div class="tui-panel-header">
              ┌─ CLUSTERS ─
            </div>
            <div class="tui-panel-body">
              <div class="space-y-1">
                <div>
                  <button type="button" class="w-full text-left px-2 py-1.5 text-sm flex items-center justify-between gap-2 rounded transition-colors hover:bg-muted/40 t-cyan font-medium" phx-click="select_cluster" phx-value-cluster="Test Cluster">
                    <span class="flex items-center gap-1.5 min-w-0">
                      <span class="transition-transform text-xs t-dim rotate-90">
                        ▶
                      </span>
                      <span class="truncate">
                        Test Cluster
                      </span>
                    </span>
                    <span class="shrink-0 text-xs t-dim">
                      1
                    </span>
                  </button>
                  <div class="ml-5 mt-0.5 space-y-0.5 border-l border-border/40 pl-2">
                    <button type="button" class="w-full text-left px-2 py-1 text-sm truncate rounded transition-colors hover:bg-muted/40 t-green font-medium" phx-click="select_neuron" phx-value-id="4050">
                      Test Neuron
                    </button>
                  </div>
                </div>
                <div class="pt-2 border-t border-border/30 mt-2">
                  <p class="text-xs t-dim font-medium mb-1">
                    UNCLUSTERED
                  </p>
                  <p class="text-xs t-dim italic px-2">
                    none
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div class="tui-panel lg:col-span-2">
            <div class="tui-panel-header">
              ┌─ DETAIL ─
            </div>
            <div class="tui-panel-body">
              <form phx-submit="save_neuron" class="space-y-4">
                <div class="flex items-center justify-between">
                  <h2 class="text-lg font-semibold t-bright">
                    Editing: Test Neuron
                  </h2>
                  <button type="button" phx-click="cancel_edit" class="text-xs t-dim hover:t-bright">
                    cancel
                  </button>
                </div>
                <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 text-sm">
                  <div>
                    <label class="text-xs t-dim block mb-1">
                      Name
                    </label>
                    <input type="text" name="neuron[name]" value="Test Neuron" aria-label="Name" class="w-full bg-muted border border-border rounded px-2 py-1.5 text-sm text-foreground"/>
                  </div>
                  <div>
                    <label class="text-xs t-dim block mb-1">
                      Team
                    </label>
                    <select name="neuron[team]" aria-label="Team" class="w-full bg-muted border border-border rounded px-2 py-1.5 text-sm text-foreground">
                      <option value="">
                        — none —
                      </option>
                      <option value="Test Cluster" selected="">
                        Test Cluster
                      </option>
                    </select>
                  </div>
                  <div>
                    <label class="text-xs t-dim block mb-1">
                      Status
                    </label>
                    <select name="neuron[status]" aria-label="Status" class="w-full bg-muted border border-border rounded px-2 py-1.5 text-sm text-foreground">
                      <option value="draft">
                        draft
                      </option>
                      <option value="shadow">
                        shadow
                      </option>
                      <option value="active" selected="">
                        active
                      </option>
                      <option value="paused">
                        paused
                      </option>
                      <option value="archived">
                        archived
                      </option>
                    </select>
                  </div>
                  <div>
                    <label class="text-xs t-dim block mb-1">
                      Rank
                    </label>
                    <select name="neuron[rank]" aria-label="Rank" class="w-full bg-muted border border-border rounded px-2 py-1.5 text-sm text-foreground">
                      <option value="apprentice" selected="">
                        apprentice
                      </option>
                      <option value="journeyman">
                        journeyman
                      </option>
                      <option value="master">
                        master
                      </option>
                    </select>
                  </div>
                  <div>
                    <label class="text-xs t-dim block mb-1">
                      Model
                    </label>
                    <input type="text" name="neuron[model]" value="ministral-3:8b" aria-label="Model" class="w-full bg-muted border border-border rounded px-2 py-1.5 text-sm text-foreground"/>
                  </div>
                </div>
                <div>
                  <label class="text-xs t-dim block mb-1">
                    SYSTEM PROMPT
                  </label>
                  <textarea name="neuron[system_prompt]" rows="12" aria-label="System Prompt" class="w-full bg-muted border border-border rounded px-3 py-2 text-xs text-foreground font-mono whitespace-pre-wrap">
                    You are a test neuron.
                  </textarea>
                </div>
                <div class="flex items-center gap-2 pt-2">
                  <button type="submit" class="px-4 py-1.5 text-sm font-medium rounded bg-primary text-primary-foreground hover:opacity-90">
                    Save
                  </button>
                  <button type="button" phx-click="delete_neuron" data-confirm="Delete this neuron?" class="px-4 py-1.5 text-sm font-medium rounded border border-red-500/50 text-red-400 hover:bg-red-500/10">
                    Delete
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
