      <div class="space-y-6">
        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold">
            Quests
          </h1>
          <div class="flex gap-2">
            <button class="phx-submit-loading:opacity-75 inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors focus-visible:ring-ring focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 h-8 rounded-md px-3 text-xs border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground" phx-click="add_campaign">

            </button>
            <button class="phx-submit-loading:opacity-75 inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors focus-visible:ring-ring focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 h-8 rounded-md px-3 text-xs border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground" phx-click="add_quest">
              + New Quest
            </button>
          </div>
        </div>
        <div class="border rounded-lg border-dashed p-4">
          <form phx-submit="create_quest" class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-sm font-medium">
                  Name
                </label>
                <div class="fieldset mb-2">
                  <label>
                    <input type="text" name="quest[name]" value="" class="w-full input" placeholder="e.g. WCAG Hourly Scan"/>
                  </label>
                </div>
              </div>
              <div>
                <label class="text-sm font-medium">
                  Description
                </label>
                <div class="fieldset mb-2">
                  <label>
                    <input type="text" name="quest[description]" value="" class="w-full input" placeholder="Optional"/>
                  </label>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
              <div>
                <label class="text-sm font-medium">
                  Who runs it
                </label>
                <select name="quest[who]" class="w-full text-sm border rounded px-2 py-1 bg-background">
                  <option value="all">
                    Everyone
                  </option>
                  <option value="apprentice">
                    Apprentice tier
                  </option>
                  <option value="journeyman">
                    Journeyman tier
                  </option>
                  <option value="master">
                    Master tier
                  </option>
                  <optgroup label="Cloud escalation">
                    <option value="claude_haiku">
                      Claude Haiku
                    </option>
                    <option value="claude_sonnet">
                      Claude Sonnet
                    </option>
                    <option value="claude_opus">
                      Claude Opus
                    </option>
                  </optgroup>
                </select>
              </div>
              <div>
                <label class="text-sm font-medium">
                  How
                </label>
                <select name="quest[how]" class="w-full text-sm border rounded px-2 py-1 bg-background">
                  <option value="consensus">
                    Consensus
                  </option>
                  <option value="solo">
                    Solo
                  </option>
                  <option value="majority">
                    Majority
                  </option>
                </select>
              </div>
              <div>
                <label class="text-sm font-medium">
                  Escalate on
                </label>
                <select name="quest[escalate_on]" class="w-full text-sm border rounded px-2 py-1 bg-background">
                  <option value="never">
                    Never
                  </option>
                  <option value="warn_or_fail">
                    Warn or fail
                  </option>
                  <option value="fail_only">
                    Fail only
                  </option>
                  <option value="always">
                    Always
                  </option>
                </select>
              </div>
              <div>
                <label class="text-sm font-medium">
                  Trigger
                </label>
                <select name="quest[trigger]" class="w-full text-sm border rounded px-2 py-1 bg-background">
                  <option value="manual">
                    Manual
                  </option>
                  <option value="source">
                    Source
                  </option>
                  <option value="scheduled">
                    Scheduled
                  </option>
                </select>
              </div>
            </div>
            <div>
              <label class="text-sm font-medium">
                Context (optional)
              </label>
              <div class="mt-1 space-y-1">
                <select name="quest[context_type]" class="w-full text-sm border rounded px-2 py-1 bg-background">
                  <option value="">
                    None
                  </option>
                  <option value="static">
                    Static text
                  </option>
                  <option value="quest_history">
                    Quest history
                  </option>
                  <option value="member_stats">
                    Member roster
                  </option>
                </select>
                <div class="fieldset mb-2">
                  <label>
                    <textarea name="quest[context_content]" class="w-full textarea" rows="2" placeholder="Static context text (if Static selected)">
                    </textarea>
                  </label>
                </div>
              </div>
            </div>
            <div class="flex justify-end gap-2">
              <button type="button" class="phx-submit-loading:opacity-75 inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors focus-visible:ring-ring focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 h-8 rounded-md px-3 text-xs border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground" phx-click="cancel_new">
                Cancel
              </button>
              <button type="submit" class="phx-submit-loading:opacity-75 inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors focus-visible:ring-ring focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 h-8 rounded-md px-3 text-xs bg-primary text-primary-foreground shadow hover:bg-primary/90">
                Create Quest
              </button>
            </div>
          </form>
        </div>
        <div>
          <h2 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-2">
            Campaigns
          </h2>
          <div class="space-y-2">
            <div class="border rounded-lg bg-card ">

              </div>

        <div>

                  </button>

              </div>

          </div>
        </div>
