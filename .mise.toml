[env]
OLLAMA_URL = "https://api.ollama.com"
OLLAMA_API_KEY = "ee5a0aa7b39e41fa96c8110d89e36a48.bIMTVyGfSaYXWn2EfGkyZXjz"

[tasks.dev]
description = "Start the app with live reload"
run = "mix phx.server"

[tasks.setup]
description = "First-time setup: deps, db, assets"
run = "mix setup"

[tasks.release]
description = "Clean build a Burrito release binary"
run = """
rm -rf _build/prod burrito_out
rm -rf ~/.local/share/.burrito/ex_cortex*
MIX_ENV=prod mix deps.get
MIX_ENV=prod mix release.build
echo ""
echo "✓ Binaries ready in burrito_out/"
ls -lh burrito_out/
"""

[tasks.start]
description = "Run the Burrito binary"
run = "./burrito_out/ex_cortex_linux_x86 start"

[tasks."start:otel"]
description = "Run the Burrito binary with OpenTelemetry export"
run = "OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 ./burrito_out/ex_cortex_linux_x86 start"

[tasks.tui]
description = "Start the interactive TUI"
raw = true
run = "mix tui"

[tasks.hud]
description = "Start the machine-readable HUD"
run = "mix hud"

[tasks.services]
description = "Start background services (db, ollama, observability)"
run = "docker compose up -d"

[tasks.stop]
description = "Stop background services"
run = "docker compose down"

[tools]
zig = "0.15.2"
