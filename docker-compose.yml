services:
  db:
    image: docker.io/timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: excellence
      POSTGRES_PASSWORD: excellence
      POSTGRES_DB: ex_cellence_server
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excellence -d ex_cellence_server"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: docker.io/ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/init-ollama.sh:/init-ollama.sh
    entrypoint: ["/bin/bash", "/init-ollama.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: ex_cellence_server/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "${PORT:-4001}:4001"
    volumes:
      - ..:/app:Z
    environment:
      DATABASE_URL: ecto://excellence:excellence@db/ex_cellence_server
      OLLAMA_URL: http://ollama:11434
      PHX_SERVER: "true"
      PORT: "4001"
      PHX_HOST: localhost
      SECRET_KEY_BASE: "dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-development-use"

volumes:
  pgdata:
  ollama_data:
