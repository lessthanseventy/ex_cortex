services:
  db:
    image: docker.io/timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: excellence
      POSTGRES_PASSWORD: excellence
      POSTGRES_DB: ex_calibur
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excellence -d ex_calibur"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: docker.io/ollama/ollama
    stop_signal: SIGKILL
    stop_grace_period: 0s
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/init-ollama.sh:/init-ollama.sh
    entrypoint: ["/bin/bash", "/init-ollama.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC  (also used by mise dev)
      - "4318:4318"   # OTLP HTTP  (also used by mise dev)

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: "true"
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"

  prometheus:
    image: docker.io/prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: docker.io/grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning

  app:
    build:
      context: ..
      dockerfile: ex_calibur/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "${PORT:-4001}:4001"
    volumes:
      - ..:/app:Z
    environment:
      DATABASE_URL: ecto://excellence:excellence@db/ex_calibur
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PHX_SERVER: "true"
      PORT: "4001"
      PHX_HOST: localhost
      SECRET_KEY_BASE: "dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-development-use"

volumes:
  pgdata:
  ollama_data:
  grafana_data:
